<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Escáner de Números</title>
    <meta name="description" content="Extraer números de fotos con IA">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Escáner">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-512.png') }}">

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .dropzone-area {
            border: 2px dashed #cbd5e1;
            transition: all 0.2s ease;
        }

        .dropzone-area:hover,
        .dropzone-area.dragover {
            border-color: #2563eb;
            background-color: #eff6ff;
        }

        .result-card {
            animation: fadeIn 0.2s ease both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading-overlay {
            display: none;
        }

        .loading-overlay:not([hidden]) {
            display: flex;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #e2e8f0;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .toast-msg {
            transform: translateX(-50%) translateY(100px);
            transition: transform 0.3s ease;
        }

        .toast-msg.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 h-14 flex-none px-6 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white">
                <i class="ph ph-camera text-lg"></i>
            </div>
            <h1 class="font-bold text-lg text-slate-800 leading-tight">Escáner de Números</h1>
        </div>
        <div class="flex items-center gap-3">
            <span
                class="flex items-center gap-1.5 px-3 py-1 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-full text-xs font-medium">
                <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                Groq Vision AI
            </span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-auto p-4 md:p-6">
        <div class="max-w-2xl mx-auto space-y-4">

            <!-- Upload Card -->
            <div class="bg-white border border-slate-200 rounded-lg shadow-sm">
                <!-- Tabs -->
                <div class="flex border-b border-slate-200">
                    <button
                        class="tab-btn flex-1 flex items-center justify-center gap-2 px-4 py-3 text-sm font-medium text-blue-600 border-b-2 border-blue-600"
                        data-tab="upload" onclick="switchTab('upload')">
                        <i class="ph ph-upload-simple"></i> Subir Foto
                    </button>
                    <button
                        class="tab-btn flex-1 flex items-center justify-center gap-2 px-4 py-3 text-sm font-medium text-slate-500 border-b-2 border-transparent hover:text-slate-700"
                        data-tab="camera" onclick="switchTab('camera')">
                        <i class="ph ph-camera"></i> Cámara
                    </button>
                </div>

                <!-- Upload Tab -->
                <div id="tab-upload" class="tab-panel p-5">
                    <div class="dropzone-area rounded-lg p-10 text-center cursor-pointer" id="dropzone"
                        onclick="document.getElementById('fileInput').click()">
                        <i class="ph ph-image text-4xl text-slate-400 mb-3"></i>
                        <p class="text-sm font-semibold text-slate-700">Arrastrá una imagen acá</p>
                        <p class="text-xs text-slate-400 mt-1">o hacé click para seleccionar</p>
                        <p class="text-xs text-slate-300 mt-3">PNG, JPG, JPEG, GIF, BMP, WEBP — Máx 10 MB</p>
                    </div>
                    <input type="file" id="fileInput" accept="image/*" hidden>
                </div>

                <!-- Camera Tab -->
                <div id="tab-camera" class="tab-panel p-5 hidden">
                    <div class="text-center">
                        <video id="cameraPreview" autoplay playsinline
                            class="w-full max-h-80 rounded-lg bg-slate-100 object-cover"></video>
                        <canvas id="cameraCanvas" hidden></canvas>
                        <div class="mt-4 flex justify-center gap-3">
                            <button
                                class="flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 text-slate-600 rounded-lg text-sm font-medium hover:bg-slate-50 transition-all shadow-sm"
                                id="btnStartCamera" onclick="startCamera()">
                                <i class="ph ph-camera"></i> Activar Cámara
                            </button>
                            <button
                                class="flex items-center gap-2 px-4 py-2 bg-red-500 text-white rounded-lg text-sm font-medium hover:bg-red-600 transition-all shadow-sm"
                                id="btnCapture" onclick="capturePhoto()" hidden>
                                <i class="ph ph-circle text-lg"></i> Capturar
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Preview -->
                <div id="previewContainer" class="px-5 pb-5" hidden>
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-sm font-medium text-slate-500">Vista previa</span>
                        <button
                            class="flex items-center gap-1 text-xs text-slate-400 hover:text-slate-600 transition-colors"
                            onclick="clearPreview()">
                            <i class="ph ph-x"></i> Limpiar
                        </button>
                    </div>
                    <img id="imagePreview"
                        class="w-full max-h-72 object-contain rounded-lg border border-slate-200 bg-slate-50"
                        alt="Vista previa">
                    <button
                        class="w-full mt-3 flex items-center justify-center gap-2 px-4 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-semibold hover:bg-blue-700 transition-all shadow-sm disabled:opacity-50 disabled:cursor-not-allowed"
                        id="btnExtract" onclick="extractNumbers()">
                        <i class="ph ph-magnifying-glass"></i> Extraer Números
                    </button>
                </div>
            </div>

            <!-- Results -->
            <div id="resultsSection" class="bg-white border border-slate-200 rounded-lg shadow-sm" hidden>
                <div class="flex items-center justify-between px-5 py-3 border-b border-slate-200">
                    <h2 class="flex items-center gap-2 text-sm font-semibold text-slate-800">
                        <i class="ph ph-list-numbers text-blue-500"></i> Números Encontrados
                    </h2>
                    <button
                        class="flex items-center gap-1.5 px-3 py-1.5 bg-white border border-slate-200 text-slate-600 rounded-lg text-xs font-medium hover:bg-slate-50 transition-all shadow-sm"
                        onclick="copyResults()">
                        <i class="ph ph-copy"></i> Copiar todo
                    </button>
                </div>
                <div id="resultsBody" class="p-5"></div>
                <div id="resultsFooter" class="px-5 py-2 border-t border-slate-100"></div>
            </div>
        </div>
    </main>

    <!-- Install Banner -->
    <div class="install-banner fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-5 py-3 flex items-center justify-between shadow-lg z-50"
        id="installBanner" hidden>
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-1.5 rounded-lg text-white">
                <i class="ph ph-download-simple"></i>
            </div>
            <div>
                <p class="text-sm font-semibold text-slate-700">Instalar aplicación</p>
                <p class="text-xs text-slate-400">Agregar a pantalla de inicio</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button class="px-3 py-1.5 text-xs text-slate-500 hover:text-slate-700" onclick="dismissInstall()">Ahora
                no</button>
            <button
                class="px-3 py-1.5 bg-blue-600 text-white rounded-lg text-xs font-medium hover:bg-blue-700 transition-all"
                onclick="installApp()">Instalar</button>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay fixed inset-0 bg-white/80 backdrop-blur-sm items-center justify-center z-50"
        id="loadingOverlay" hidden>
        <div class="text-center">
            <div class="spinner mx-auto mb-3"></div>
            <p class="text-sm font-medium text-slate-700">Analizando imagen...</p>
            <p class="text-xs text-slate-400 mt-1">Esto puede tardar unos segundos</p>
        </div>
    </div>

    <script>
        let currentFile = null;
        let currentBase64 = null;
        let cameraStream = null;
        let lastResults = null;

        // === Tab Switching ===
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(t => {
                t.classList.remove('text-blue-600', 'border-blue-600');
                t.classList.add('text-slate-500', 'border-transparent');
            });
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('text-blue-600', 'border-blue-600');
            document.querySelector(`[data-tab="${tab}"]`).classList.remove('text-slate-500', 'border-transparent');
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            if (tab !== 'camera' && cameraStream) stopCamera();
        }

        // === File Upload ===
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');

        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault(); dropzone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => { if (e.target.files.length > 0) handleFile(e.target.files[0]); });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) { showToast('Seleccioná una imagen', 'error'); return; }
            if (file.size > 10 * 1024 * 1024) { showToast('Imagen muy grande (máx 10 MB)', 'error'); return; }
            currentFile = file; currentBase64 = null;
            const reader = new FileReader();
            reader.onload = (e) => showPreview(e.target.result);
            reader.readAsDataURL(file);
        }

        // === Camera ===
        async function startCamera() {
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } });
                document.getElementById('cameraPreview').srcObject = cameraStream;
                document.getElementById('btnStartCamera').hidden = true;
                document.getElementById('btnCapture').hidden = false;
            } catch (err) { showToast('No se pudo acceder a la cámara', 'error'); }
        }

        function stopCamera() {
            if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
            document.getElementById('cameraPreview').srcObject = null;
            document.getElementById('btnStartCamera').hidden = false;
            document.getElementById('btnCapture').hidden = true;
        }

        function capturePhoto() {
            const video = document.getElementById('cameraPreview');
            const canvas = document.getElementById('cameraCanvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            currentBase64 = canvas.toDataURL('image/jpeg', 0.9);
            currentFile = null;
            showPreview(currentBase64);
            stopCamera(); switchTab('upload');
        }

        // === Preview ===
        function showPreview(src) {
            document.getElementById('imagePreview').src = src;
            document.getElementById('previewContainer').hidden = false;
            document.getElementById('resultsSection').hidden = true;
        }

        function clearPreview() {
            document.getElementById('previewContainer').hidden = true;
            document.getElementById('resultsSection').hidden = true;
            currentFile = null; currentBase64 = null; fileInput.value = '';
        }

        // === Extract Numbers ===
        async function extractNumbers() {
            const btn = document.getElementById('btnExtract');
            const overlay = document.getElementById('loadingOverlay');
            btn.disabled = true; overlay.hidden = false;

            try {
                let response;
                if (currentFile) {
                    const formData = new FormData(); formData.append('image', currentFile);
                    response = await fetch('/extract', { method: 'POST', body: formData });
                } else if (currentBase64) {
                    response = await fetch('/extract-base64', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: currentBase64 })
                    });
                } else { showToast('No hay imagen para analizar', 'error'); return; }

                const result = await response.json();
                if (result.success) displayResults(result);
                else showToast('Error: ' + result.error, 'error');
            } catch (err) { showToast('Error de conexión', 'error'); }
            finally { btn.disabled = false; overlay.hidden = true; }
        }

        // === Display Results ===
        function displayResults(result) {
            const section = document.getElementById('resultsSection');
            const body = document.getElementById('resultsBody');
            const footer = document.getElementById('resultsFooter');
            section.hidden = false;

            try {
                const data = JSON.parse(result.data);
                lastResults = data;

                if (!data.numeros || data.numeros.length === 0) {
                    body.innerHTML = `<div class="text-center py-8 text-slate-400">
                        <i class="ph ph-x-circle text-3xl mb-2"></i>
                        <p class="text-sm">No se encontraron números</p>
                    </div>`;
                } else {
                    body.innerHTML = `
                        <div class="flex items-center gap-2 mb-4">
                            <span class="flex items-center justify-center w-7 h-7 bg-blue-600 text-white rounded-full text-xs font-bold">${data.numeros.length}</span>
                            <span class="text-sm text-slate-500">número${data.numeros.length !== 1 ? 's' : ''} encontrado${data.numeros.length !== 1 ? 's' : ''}</span>
                        </div>
                        <div class="space-y-2">
                            ${data.numeros.map((n, i) => `
                                <div class="result-card flex items-center gap-3 px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg hover:bg-slate-100 transition-colors group" style="animation-delay:${i * 0.04}s">
                                    <span class="text-base font-bold text-slate-800 tabular-nums min-w-[80px]">${escapeHtml(n.valor)}</span>
                                    <span class="flex-1 text-xs text-slate-400">${escapeHtml(n.contexto || '')}</span>
                                    <button class="opacity-0 group-hover:opacity-100 text-slate-400 hover:text-blue-600 transition-all" onclick="copySingle('${escapeHtml(n.valor)}')" title="Copiar">
                                        <i class="ph ph-copy text-sm"></i>
                                    </button>
                                </div>
                            `).join('')}
                        </div>`;
                }

                footer.innerHTML = `<div class="flex justify-between text-xs text-slate-400 py-1">
                    <span>Modelo: ${result.model || 'llama-4-scout'}</span>
                    <span>Tokens: ${result.tokens?.total || '-'}</span>
                </div>`;
            } catch (e) {
                body.innerHTML = `<pre class="text-xs text-slate-600 bg-slate-50 p-3 rounded-lg overflow-auto">${escapeHtml(result.data)}</pre>`;
            }
            section.scrollIntoView({ behavior: 'smooth' });
        }

        // === Utilities ===
        function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
        function copySingle(v) { navigator.clipboard.writeText(v).then(() => showToast('Copiado: ' + v)); }
        function copyResults() {
            if (!lastResults || !lastResults.numeros) return;
            navigator.clipboard.writeText(lastResults.numeros.map(n => `${n.valor} — ${n.contexto || ''}`).join('\n')).then(() => showToast('Todos los números copiados'));
        }

        function showToast(msg, type = 'success') {
            const old = document.querySelector('.toast-msg'); if (old) old.remove();
            const t = document.createElement('div');
            t.className = `toast-msg fixed bottom-6 left-1/2 px-4 py-2.5 rounded-lg text-sm font-medium shadow-lg z-[200] ${type === 'error' ? 'bg-red-600 text-white' : 'bg-slate-800 text-white'}`;
            t.textContent = msg; document.body.appendChild(t);
            requestAnimationFrame(() => t.classList.add('show'));
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3000);
        }

        // === PWA Install ===
        let deferredPrompt = null;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            document.getElementById('installBanner').hidden = false;
        });
        function installApp() {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((c) => {
                if (c.outcome === 'accepted') showToast('Aplicación instalada');
                deferredPrompt = null;
                document.getElementById('installBanner').hidden = true;
            });
        }
        function dismissInstall() { document.getElementById('installBanner').hidden = true; }

        // === Service Worker ===
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').then(() => console.log('SW registrado'));
        }
    </script>
</body>

</html>
